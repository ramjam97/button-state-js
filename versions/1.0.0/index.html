<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Font Awesome 5 Free CDN -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

</head>

<body>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Odit quia at esse hic assumenda sapiente, sint
        repudiandae corporis inventore magni, nisi iusto! Odit est impedit voluptate ipsum provident, ipsa autem!</p>
    <button class="btn" id="btn1">Click Me 1</button>
    <button class="btn" id="btn2">Click Me 2</button>
    <button class="btn" id="btn3">Click Me 3</button>
</body>

<script src="./button-state.min.js"></script>

<script>

    const btn1 = useBtnState('#btn1', { loadingHtml: `Loading...` });
    const btn2 = useBtnState('#btn2', { loadingIcon: ` <i class="fas fa-spinner fa-pulse"></i>` });
    const btn3 = useBtnState('#btn3', { loadingIcon: ` <i class="fas fa-spinner fa-pulse"></i>` });

    console.log('btn1:', btn1);
    console.log('btn2:', btn2);
    console.log('btn3:', btn3);

    document.getElementById('btn1').addEventListener('click', () => {

        console.log('btn1 clicked');

        btn1.loading(true);
        btn2.disabled(true);
        btn3.disabled(true);

        setTimeout(() => {
            btn1.loading(false);
            btn2.reset();
            btn3.reset();
        }, 2_000);
    });

    document.getElementById('btn3').addEventListener('click', () => {

        console.log('btn3 clicked');

        btn3.loading(true);

        setTimeout(() => btn3.loading(false), 2_000);

    });

    document.getElementById('btn2').addEventListener('click', () => {
        console.log('btn2 clicked');

        btn2.loading(true);

        setTimeout(() => btn2.loading(false), 2_000);
    });


    btn1.watch((state) => console.log('btn1 state:', state));
    btn2.watchEffects((state) => console.log('btn2 state:', state));
    btn3.watchEffects((state) => console.log('btn3 state:', state));

</script>

</html>
